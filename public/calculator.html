        $('#btnAdd').click(() => {
            const num1 = $('#num1').val();
            const num2 = $('#num2').val();

            $.ajax({
                url: '/add',
                data: {num1,num2}
            })
                .done(result => {
                    $('#sResult').html(result);
                });
        });
